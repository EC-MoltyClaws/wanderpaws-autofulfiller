name: Daily Shopify Orders Report

on:
  schedule:
    # Runs at 10:15 SGT (02:15 UTC) every day
    - cron: '15 2 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl pytz python-dotenv
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Report Generator Script
      id: run_script
      env:
        MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        MAKE_LAST_ORDER_WEBHOOK_URL: ${{ secrets.MAKE_LAST_ORDER_WEBHOOK_URL }}
        MAKE_WEBHOOK_API_KEY: ${{ secrets.MAKE_WEBHOOK_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        REPORT_TIMEZONE: "Asia/Singapore"
      run: |
        # Redirect stderr to a file so we can capture exactly why it failed
        python scripts/generate_report.py 2> error_log.txt || (cat error_log.txt; exit 1)

    - name: Create Issue on Failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "## Autofulfiller Script Failed" > issue_body.md
        echo "" >> issue_body.md
        echo "The \`generate_report.py\` script encountered an error during the scheduled run." >> issue_body.md
        echo "" >> issue_body.md
        echo "### Error Output" >> issue_body.md
        echo "\`\`\`" >> issue_body.md
        cat error_log.txt >> issue_body.md
        echo "\`\`\`" >> issue_body.md
        echo "" >> issue_body.md
        echo "Run details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> issue_body.md

        gh issue create \
          --title "🚨 Autofulfiller Scheduled Run Failed" \
          --body-file issue_body.md \
          --label "bug" \
          --assignee "@me"
