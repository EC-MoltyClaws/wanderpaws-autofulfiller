name: Daily Shopify Orders Report

on:
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: read
  issues: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests openpyxl pytz python-dotenv
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Fetch Reship Orders
      id: fetch_reships
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Fetch full issue bodies (which should contain the JSON payloads)
        gh issue list --label "reship" --state "open" --json number,title,body > reships.json
        echo "Saved open reship issues to reships.json"

    - name: Run Report Generator Script
      id: run_script
      env:
        MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        MAKE_LAST_ORDER_WEBHOOK_URL: ${{ secrets.MAKE_LAST_ORDER_WEBHOOK_URL }}
        MAKE_WEBHOOK_API_KEY: ${{ secrets.MAKE_WEBHOOK_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        REPORT_TIMEZONE: "Asia/Singapore"
      run: |
        # Redirect stderr to a file so we can capture exactly why it failed
        python scripts/generate_report.py 2> error_log.txt || (cat error_log.txt; exit 1)

    - name: Close Reship Issues
      if: success()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Mark reship queue as done if the Python script succeeded
        if [ -s reships.json ] && [ "$(jq 'length' reships.json)" -gt 0 ]; then
          for id in $(jq -r '.[].number' reships.json); do
            echo "Closing issue #$id"
            gh issue close $id --reason "completed" -c "Order was successfully added to today's fulfillment report."
          done
        else
          echo "No reships to close."
        fi

    - name: Create Issue on Failure
      if: failure()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "## Autofulfiller Script Failed" > issue_body.md
        echo "" >> issue_body.md
        echo "The \`generate_report.py\` script encountered an error during the scheduled run." >> issue_body.md
        echo "" >> issue_body.md
        echo "### Error Output" >> issue_body.md
        echo "\`\`\`" >> issue_body.md
        cat error_log.txt >> issue_body.md
        echo "\`\`\`" >> issue_body.md
        echo "" >> issue_body.md
        echo "Run details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> issue_body.md

        gh issue create \
          --title "🚨 Autofulfiller Scheduled Run Failed" \
          --body-file issue_body.md \
          --label "bug" \
          --assignee "@me"
